services:
  db:
    image: pgvector/pgvector:pg16
    container_name: anios_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-anios_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER:-postgres}" -d "$${POSTGRES_DB:-anios_db}"
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anios_redis
    ports:
      - "6379:6379"

  local-capabilities:
    build: .
    container_name: anios_local_capabilities
    command:
      - python
      - -m
      - backend.capabilities.visual_mcp
    ports:
      - "8001:8001"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-anios_db}
      - POSTGRES_HOST=db
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env (see .env.example)}
      - LLM_BASE_URL=http://host.docker.internal:1234
      - IMAGE_PROVIDER_BASE_URL=http://host.docker.internal:8188
      - ARTIFACT_STORAGE_ROOT=/app/data/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - artifactdata:/app/data/artifacts
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: .
    container_name: anios_backend
    ports:
      - "8000:8000"
    environment:
      # Credentials come from .env; the container-only values below stay literal
      # because .env holds host-oriented ones (POSTGRES_HOST=localhost).
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-anios_db}
      - POSTGRES_HOST=db
      # No default: a missing secret must fail the run, never fall back to a
      # committed placeholder that would sign real auth tokens.
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env (see .env.example)}
      # LM Studio runs on the host; reach it from inside the container.
      - LLM_BASE_URL=http://host.docker.internal:1234
      # Points at the host ComfyUI install (E:/AI/ComfyUI), started with
      # --listen 0.0.0.0 so the container can reach it. To use the sibling
      # `comfyui` service instead, run `--profile comfyui` and set this to
      # http://comfyui:8188 (that GPU image build needs ~10-20 GB free on C:).
      - IMAGE_PROVIDER_BASE_URL=http://host.docker.internal:8188
      - ARTIFACT_STORAGE_ROOT=/app/data/artifacts
      # Opt-in web search. Empty disables it: routing still runs and logs its
      # decision, but no query is ever sent.
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - SEARCH_PROVIDER_NAME=${SEARCH_PROVIDER_NAME:-tavily}
      - SEARCH_MCP_SERVER_ID=${SEARCH_MCP_SERVER_ID:-internet}
      - SEARCH_MCP_TOOL_NAME=${SEARCH_MCP_TOOL_NAME:-search_web}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_SEARCH_ENABLED=${GOOGLE_SEARCH_ENABLED:-false}
      - GOOGLE_SEARCH_MODEL=${GOOGLE_SEARCH_MODEL:-gemini-3.6-flash}
      - GOOGLE_SEARCH_TIMEOUT_SECONDS=${GOOGLE_SEARCH_TIMEOUT_SECONDS:-30}
      - GOOGLE_SEARCH_MAX_OUTPUT_TOKENS=${GOOGLE_SEARCH_MAX_OUTPUT_TOKENS:-2048}
      - GOOGLE_SEARCH_DAILY_LIMIT=${GOOGLE_SEARCH_DAILY_LIMIT:-450}
      - GOOGLE_SEARCH_QUOTA_DB_PATH=/app/data/search/google_search_quota.sqlite3
      - MCP_SERVERS_JSON=${MCP_SERVERS_JSON:-[]}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER=${OTEL_EXPORTER:-console}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - artifactdata:/app/data/artifacts
      - searchdata:/app/data/search
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      local-capabilities:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: anios_frontend
    ports:
      - "5173:5173"
    environment:
      # Poll the bind-mounted source so hot reload fires across the Docker mount.
      - VITE_USE_POLLING=true
    volumes:
      - ./frontend:/app
      # Keep the image's installed node_modules instead of the host's (if any).
      - /app/node_modules
    depends_on:
      - backend

  comfyui:
    build:
      context: ./docker/comfyui
    container_name: anios_comfyui
    # Opt-in: heavy GPU image build. Start with `docker compose --profile comfyui up`.
    profiles: ["comfyui"]
    ports:
      - "8188:8188"
    volumes:
      # Bind-mount your existing ComfyUI install (code, custom nodes, and models).
      - ${COMFYUI_HOST_PATH:-E:/AI/ComfyUI}:/comfyui
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  memory-maintenance:
    build: .
    profiles: ["maintenance"]
    command:
      - python
      - -m
      - backend.cli.run_memory_maintenance
      - --all-users
      - --strict
      - --interval-seconds
      - "3600"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-anios_db}
      - POSTGRES_HOST=db
      - SECRET_KEY=${SECRET_KEY:?set SECRET_KEY in .env (see .env.example)}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  artifactdata:
  searchdata:
