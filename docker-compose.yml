services:
  db:
    image: pgvector/pgvector:pg16
    container_name: anios_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: anios_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "anios_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: anios_redis
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: anios_backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=anios_db
      - POSTGRES_HOST=db
      - SECRET_KEY=your-super-secret-key-here
      - IMAGE_PROVIDER_BASE_URL=http://host.docker.internal:8188
      - ARTIFACT_STORAGE_ROOT=/app/data/artifacts
    volumes:
      - artifactdata:/app/data/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  memory-maintenance:
    build: .
    profiles: ["maintenance"]
    command:
      - python
      - -m
      - backend.cli.run_memory_maintenance
      - --all-users
      - --strict
      - --interval-seconds
      - "3600"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=anios_db
      - POSTGRES_HOST=db
      - SECRET_KEY=your-super-secret-key-here
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  artifactdata:
